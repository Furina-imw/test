name: Build librocksdbjni Android (Self-contained .so)

on:
  workflow_dispatch:
    inputs:
      rocksdb_version:
        description: 'RocksDB version to build'
        required: true
        default: '10.2.1'
      ndk_version:
        description: 'Android NDK version'
        required: true
        default: '27.2.12479018'
      api_level:
        description: 'Minimum Android API level'
        required: true
        default: '21'

env:
  ROCKSDB_VERSION: ${{ github.event.inputs.rocksdb_version || '10.2.1' }}
  NDK_VERSION: ${{ github.event.inputs.ndk_version || '27.2.12479018' }}
  MIN_SDK: ${{ github.event.inputs.api_level || '21' }}
  # Thư mục output cuối cùng
  OUTPUT_DIR: ${{ github.workspace }}/output

jobs:
  # ============================================================
  # Job 1: Build .so cho từng ABI song song
  # ============================================================
  build-android-so:
    name: Build ${{ matrix.abi }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        abi:
          - armeabi-v7a
          - arm64-v8a
          - x86
          - x86_64

    steps:
      # ----------------------------------------------------------
      # 1. Checkout
      # ----------------------------------------------------------
      - name: Checkout RocksDB ${{ env.ROCKSDB_VERSION }}
        uses: actions/checkout@v4
        with:
          repository: facebook/rocksdb
          ref: v${{ env.ROCKSDB_VERSION }}
          submodules: recursive
          fetch-depth: 1

      # ----------------------------------------------------------
      # 2. Cài đặt Java (cần để tạo JNI headers)
      # ----------------------------------------------------------
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ----------------------------------------------------------
      # 3. Cài đặt Android SDK + NDK
      # ----------------------------------------------------------
      - name: Set up Android SDK & NDK
        uses: android-actions/setup-android@v3
        with:
          packages: >
            ndk;${{ env.NDK_VERSION }}
            cmake;3.22.1

      - name: Export NDK path
        run: |
          NDK_ROOT="${ANDROID_SDK_ROOT}/ndk/${{ env.NDK_VERSION }}"
          echo "NDK_ROOT=${NDK_ROOT}" >> $GITHUB_ENV
          echo "TOOLCHAIN=${NDK_ROOT}/toolchains/llvm/prebuilt/linux-x86_64" >> $GITHUB_ENV

      # ----------------------------------------------------------
      # 4. Cài công cụ build
      # ----------------------------------------------------------
      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build \
            python3 python3-pip \
            autoconf automake libtool pkg-config \
            curl wget git zip unzip patch

      # ----------------------------------------------------------
      # 5. Map ABI → cross-compile triple + API
      # ----------------------------------------------------------
      - name: Set ABI-specific variables
        run: |
          ABI="${{ matrix.abi }}"
          MIN_SDK="${{ env.MIN_SDK }}"

          case "$ABI" in
            armeabi-v7a)
              TRIPLE="armv7a-linux-androideabi"
              CLANG_TRIPLE="armv7a-linux-androideabi${MIN_SDK}"
              ANDROID_ARCH="arm"
              CMAKE_ABI="armeabi-v7a"
              CMAKE_ARM_NEON="TRUE"
              ;;
            arm64-v8a)
              TRIPLE="aarch64-linux-android"
              CLANG_TRIPLE="aarch64-linux-android${MIN_SDK}"
              ANDROID_ARCH="arm64"
              CMAKE_ABI="arm64-v8a"
              CMAKE_ARM_NEON="FALSE"
              ;;
            x86)
              TRIPLE="i686-linux-android"
              CLANG_TRIPLE="i686-linux-android${MIN_SDK}"
              ANDROID_ARCH="x86"
              CMAKE_ABI="x86"
              CMAKE_ARM_NEON="FALSE"
              ;;
            x86_64)
              TRIPLE="x86_64-linux-android"
              CLANG_TRIPLE="x86_64-linux-android${MIN_SDK}"
              ANDROID_ARCH="x86_64"
              CMAKE_ABI="x86_64"
              CMAKE_ARM_NEON="FALSE"
              ;;
          esac

          CC="${{ env.TOOLCHAIN }}/bin/${CLANG_TRIPLE}-clang"
          CXX="${{ env.TOOLCHAIN }}/bin/${CLANG_TRIPLE}-clang++"
          AR="${{ env.TOOLCHAIN }}/bin/llvm-ar"
          RANLIB="${{ env.TOOLCHAIN }}/bin/llvm-ranlib"
          STRIP="${{ env.TOOLCHAIN }}/bin/llvm-strip"
          NM="${{ env.TOOLCHAIN }}/bin/llvm-nm"

          echo "TRIPLE=${TRIPLE}"                   >> $GITHUB_ENV
          echo "CLANG_TRIPLE=${CLANG_TRIPLE}"       >> $GITHUB_ENV
          echo "ANDROID_ARCH=${ANDROID_ARCH}"       >> $GITHUB_ENV
          echo "CMAKE_ABI=${CMAKE_ABI}"             >> $GITHUB_ENV
          echo "CMAKE_ARM_NEON=${CMAKE_ARM_NEON}"   >> $GITHUB_ENV
          echo "CC=${CC}"     >> $GITHUB_ENV
          echo "CXX=${CXX}"   >> $GITHUB_ENV
          echo "AR=${AR}"     >> $GITHUB_ENV
          echo "RANLIB=${RANLIB}" >> $GITHUB_ENV
          echo "STRIP=${STRIP}"   >> $GITHUB_ENV
          echo "NM=${NM}"         >> $GITHUB_ENV

          DEPS_INSTALL="${{ github.workspace }}/deps-install/${{ matrix.abi }}"
          echo "DEPS_INSTALL=${DEPS_INSTALL}"       >> $GITHUB_ENV
          mkdir -p "${DEPS_INSTALL}"

      # ----------------------------------------------------------
      # 6. Build zlib (tĩnh)
      # ----------------------------------------------------------
      - name: Build zlib (static)
        run: |
          ZLIB_VERSION="1.3.1"
          curl -fsSL "https://zlib.net/zlib-${ZLIB_VERSION}.tar.gz" | tar xz
          cd "zlib-${ZLIB_VERSION}"

          CC="${CC}" \
          AR="${AR}" \
          RANLIB="${RANLIB}" \
          CFLAGS="-fPIC -O2" \
          ./configure \
            --prefix="${DEPS_INSTALL}" \
            --static

          make -j$(nproc)
          make install
          # Chỉ giữ .a, không cần .so
          rm -f "${DEPS_INSTALL}/lib/libz.so"* || true

      # ----------------------------------------------------------
      # 7. Build liblz4 (tĩnh)
      # ----------------------------------------------------------
      - name: Build liblz4 (static)
        run: |
          LZ4_VERSION="1.9.4"
          curl -fsSL \
            "https://github.com/lz4/lz4/archive/refs/tags/v${LZ4_VERSION}.tar.gz" \
            | tar xz
          cd "lz4-${LZ4_VERSION}"

          make -j$(nproc) \
            CC="${CC}" \
            AR="${AR}" \
            RANLIB="${RANLIB}" \
            CFLAGS="-fPIC -O2" \
            PREFIX="${DEPS_INSTALL}" \
            BUILD_SHARED=no \
            install

      # ----------------------------------------------------------
      # 8. Build libsnappy (tĩnh)
      # ----------------------------------------------------------
      - name: Build libsnappy (static)
        run: |
          SNAPPY_VERSION="1.2.1"
          curl -fsSL \
            "https://github.com/google/snappy/archive/refs/tags/${SNAPPY_VERSION}.tar.gz" \
            | tar xz
          cd "snappy-${SNAPPY_VERSION}"
          mkdir build && cd build

          cmake .. \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="${NDK_ROOT}/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI="${CMAKE_ABI}" \
            -DANDROID_PLATFORM="android-${{ env.MIN_SDK }}" \
            -DANDROID_STL="c++_static" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="${DEPS_INSTALL}" \
            -DSNAPPY_BUILD_TESTS=OFF \
            -DSNAPPY_BUILD_BENCHMARKS=OFF \
            -DBUILD_SHARED_LIBS=OFF

          ninja -j$(nproc)
          ninja install

      # ----------------------------------------------------------
      # 9. Build libbz2 (tĩnh)
      # ----------------------------------------------------------
      - name: Build libbz2 (static)
        run: |
          BZ2_VERSION="1.0.8"
          curl -fsSL \
            "https://sourceware.org/pub/bzip2/bzip2-${BZ2_VERSION}.tar.gz" \
            | tar xz
          cd "bzip2-${BZ2_VERSION}"

          make -j$(nproc) \
            CC="${CC}" \
            AR="${AR}" \
            RANLIB="${RANLIB}" \
            CFLAGS="-fPIC -O2" \
            libbz2.a

          install -D libbz2.a  "${DEPS_INSTALL}/lib/libbz2.a"
          install -D bzlib.h   "${DEPS_INSTALL}/include/bzlib.h"

      # ----------------------------------------------------------
      # 10. Build libzstd (tĩnh)
      # ----------------------------------------------------------
      - name: Build libzstd (static)
        run: |
          ZSTD_VERSION="1.5.6"
          curl -fsSL \
            "https://github.com/facebook/zstd/archive/refs/tags/v${ZSTD_VERSION}.tar.gz" \
            | tar xz
          cd "zstd-${ZSTD_VERSION}/build/cmake"
          mkdir build && cd build

          cmake .. \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="${NDK_ROOT}/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI="${CMAKE_ABI}" \
            -DANDROID_PLATFORM="android-${{ env.MIN_SDK }}" \
            -DANDROID_STL="c++_static" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="${DEPS_INSTALL}" \
            -DZSTD_BUILD_STATIC=ON \
            -DZSTD_BUILD_SHARED=OFF \
            -DZSTD_BUILD_PROGRAMS=OFF \
            -DZSTD_BUILD_TESTS=OFF

          ninja -j$(nproc)
          ninja install

      # ----------------------------------------------------------
      # 11. Tạo JNI headers từ source RocksDB
      # ----------------------------------------------------------
      - name: Generate JNI headers
        working-directory: ${{ github.workspace }}
        run: |
          # Biên dịch tất cả file .java trong java/src
          JAVA_SRC_DIR="java/src/main/java"
          JNI_CLASSES_DIR="${{ github.workspace }}/java_classes"
          JNI_HEADER_DIR="${{ github.workspace }}/java/include"

          mkdir -p "${JNI_CLASSES_DIR}" "${JNI_HEADER_DIR}"

          # Thu thập tất cả .java file
          find "${JAVA_SRC_DIR}" -name "*.java" > /tmp/java_sources.txt

          javac \
            -d "${JNI_CLASSES_DIR}" \
            -cp "${JAVA_SRC_DIR}" \
            -source 8 -target 8 \
            @/tmp/java_sources.txt

          # Tạo JNI headers (javah đã bị loại bỏ, dùng javac -h)
          javac \
            -h "${JNI_HEADER_DIR}" \
            -d "${JNI_CLASSES_DIR}" \
            -cp "${JAVA_SRC_DIR}" \
            -source 8 -target 8 \
            @/tmp/java_sources.txt

      # ----------------------------------------------------------
      # 12. Build RocksDB core (tĩnh) + JNI layer
      # ----------------------------------------------------------
      - name: Build RocksDB static + JNI
        working-directory: ${{ github.workspace }}
        run: |
          JNI_BUILD_DIR="${{ github.workspace }}/build-${{ matrix.abi }}"
          mkdir -p "${JNI_BUILD_DIR}"

          # ---- Cờ compile chung ----
          COMMON_CFLAGS="-fPIC -O2 -DNDEBUG \
            -I${DEPS_INSTALL}/include \
            -I${{ github.workspace }}/include \
            -I${{ github.workspace }}/java/include"

          COMMON_CXXFLAGS="${COMMON_CFLAGS} -std=c++17 -frtti -fexceptions"

          # ARM NEON
          if [ "${CMAKE_ARM_NEON}" = "TRUE" ]; then
            COMMON_CFLAGS="${COMMON_CFLAGS} -mfpu=neon"
            COMMON_CXXFLAGS="${COMMON_CXXFLAGS} -mfpu=neon"
          fi

          # ---- CMake configure ----
          cmake -S . -B "${JNI_BUILD_DIR}" \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="${NDK_ROOT}/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI="${CMAKE_ABI}" \
            -DANDROID_PLATFORM="android-${{ env.MIN_SDK }}" \
            -DANDROID_STL="c++_static" \
            -DCMAKE_BUILD_TYPE=Release \
            \
            -DCMAKE_C_FLAGS="${COMMON_CFLAGS}" \
            -DCMAKE_CXX_FLAGS="${COMMON_CXXFLAGS}" \
            \
            -DCMAKE_PREFIX_PATH="${DEPS_INSTALL}" \
            -DZLIB_ROOT="${DEPS_INSTALL}" \
            -DLZ4_ROOT="${DEPS_INSTALL}" \
            -DSNAPPY_ROOT_DIR="${DEPS_INSTALL}" \
            -DBZIP2_ROOT="${DEPS_INSTALL}" \
            -Dzstd_ROOT="${DEPS_INSTALL}" \
            \
            -DWITH_TESTS=OFF \
            -DWITH_TOOLS=OFF \
            -DWITH_BENCHMARK_TOOLS=OFF \
            -DWITH_CORE_TOOLS=OFF \
            -DWITH_EXAMPLES=OFF \
            -DWITH_GFLAGS=OFF \
            -DWITH_LIBURING=OFF \
            -DWITH_NUMA=OFF \
            -DWITH_TBB=OFF \
            \
            -DWITH_ZLIB=ON \
            -DWITH_LZ4=ON \
            -DWITH_SNAPPY=ON \
            -DWITH_BZ2=ON \
            -DWITH_ZSTD=ON \
            \
            -DPORTABLE=ON \
            -DFORCE_SSE42=OFF \
            -DROCKSDB_BUILD_SHARED=OFF \
            -DBUILD_SHARED_LIBS=OFF \
            \
            -DJNI=ON \
            -DJAVA_HOME="${JAVA_HOME}"

          # ---- Build ----
          cmake --build "${JNI_BUILD_DIR}" \
            --target rocksdb \
            -j$(nproc)

      # ----------------------------------------------------------
      # 13. Link tất cả thành 1 file .so duy nhất
      #     (whole-archive để kéo toàn bộ symbol vào)
      # ----------------------------------------------------------
      - name: Link single self-contained librocksdbjni.so
        run: |
          JNI_BUILD_DIR="${{ github.workspace }}/build-${{ matrix.abi }}"
          OUT_SO_DIR="${{ github.workspace }}/jni-lib/${{ matrix.abi }}"
          mkdir -p "${OUT_SO_DIR}"

          # Tập hợp tất cả .a cần link
          STATIC_LIBS="\
            ${JNI_BUILD_DIR}/librocksdb.a \
            ${DEPS_INSTALL}/lib/libz.a \
            ${DEPS_INSTALL}/lib/liblz4.a \
            ${DEPS_INSTALL}/lib/libsnappy.a \
            ${DEPS_INSTALL}/lib/libbz2.a \
            ${DEPS_INSTALL}/lib/libzstd.a"

          # Tìm source JNI .cpp
          JNI_SRC_FILES=$(find \
            "${{ github.workspace }}/java/rocksjni" \
            -name "*.cc" -o -name "*.cpp" \
            | tr '\n' ' ')

          # Biên dịch JNI source → object files
          OBJ_DIR="${JNI_BUILD_DIR}/jni_objs"
          mkdir -p "${OBJ_DIR}"

          for src in ${JNI_SRC_FILES}; do
            base=$(basename "${src}")
            "${CXX}" \
              -fPIC -O2 -std=c++17 -frtti -fexceptions \
              -DNDEBUG \
              -I"${{ github.workspace }}/include" \
              -I"${{ github.workspace }}/java/include" \
              -I"${DEPS_INSTALL}/include" \
              -I"${JAVA_HOME}/include" \
              -I"${JAVA_HOME}/include/linux" \
              -c "${src}" \
              -o "${OBJ_DIR}/${base%.cc}.o" \
              -o "${OBJ_DIR}/${base%.cpp}.o" 2>/dev/null || \
            "${CXX}" \
              -fPIC -O2 -std=c++17 -frtti -fexceptions \
              -DNDEBUG \
              -I"${{ github.workspace }}/include" \
              -I"${{ github.workspace }}/java/include" \
              -I"${DEPS_INSTALL}/include" \
              -I"${JAVA_HOME}/include" \
              -I"${JAVA_HOME}/include/linux" \
              -c "${src}" \
              -o "${OBJ_DIR}/${base%.*}.o"
          done

          JNI_OBJS=$(find "${OBJ_DIR}" -name "*.o" | tr '\n' ' ')

          # ---- Link thành .so duy nhất ----
          # -Wl,--whole-archive: kéo toàn bộ symbol từ .a vào .so
          # -Wl,--exclude-libs,ALL: ẩn symbol của .a khỏi bảng xuất
          # -llog / -landroid: system libs trên Android (dynamic, không cần bundle)
          "${CXX}" \
            -shared \
            -fPIC \
            -Wl,-soname,librocksdbjni.so \
            -Wl,--gc-sections \
            -Wl,--version-script="${{ github.workspace }}/.github/workflows/rocksdbjni.map" \
            ${JNI_OBJS} \
            -Wl,--whole-archive \
              ${STATIC_LIBS} \
            -Wl,--no-whole-archive \
            -Wl,--exclude-libs,ALL \
            -llog \
            -lz \
            -static-libstdc++ \
            -o "${OUT_SO_DIR}/librocksdbjni.so"

          # Strip debug symbols để giảm kích thước
          "${STRIP}" --strip-unneeded \
            "${OUT_SO_DIR}/librocksdbjni.so"

          echo "=== Output ==="
          ls -lh "${OUT_SO_DIR}/librocksdbjni.so"
          file  "${OUT_SO_DIR}/librocksdbjni.so"

      # ----------------------------------------------------------
      # 14. Kiểm tra: không được phụ thuộc .so ngoài system
      # ----------------------------------------------------------
      - name: Verify no non-system .so dependencies
        run: |
          SO="${{ github.workspace }}/jni-lib/${{ matrix.abi }}/librocksdbjni.so"
          READELF="${{ env.TOOLCHAIN }}/bin/llvm-readelf"

          echo "=== Dynamic dependencies ==="
          "${READELF}" -d "${SO}" | grep NEEDED || true

          # Danh sách .so được phép (Android system libs)
          ALLOWED="liblog.so|libz.so|libm.so|libc.so|libdl.so|libstdc++.so|libGLESv2.so|libandroid.so"

          FORBIDDEN=$("${READELF}" -d "${SO}" \
            | grep NEEDED \
            | grep -Eo '\[.*\]' \
            | tr -d '[]' \
            | grep -Ev "${ALLOWED}" || true)

          if [ -n "${FORBIDDEN}" ]; then
            echo "❌ Forbidden .so dependencies found:"
            echo "${FORBIDDEN}"
            exit 1
          else
            echo "✅ Only system .so dependencies — self-contained check passed"
          fi

      # ----------------------------------------------------------
      # 15. Kiểm tra JNI symbols export đúng
      # ----------------------------------------------------------
      - name: Verify JNI symbols exported
        run: |
          SO="${{ github.workspace }}/jni-lib/${{ matrix.abi }}/librocksdbjni.so"
          NM_BIN="${{ env.TOOLCHAIN }}/bin/llvm-nm"

          EXPORTED=$("${NM_BIN}" -D --defined-only "${SO}" \
            | grep -c "Java_org_rocksdb" || true)
          echo "Exported JNI symbols: ${EXPORTED}"

          if [ "${EXPORTED}" -lt 10 ]; then
            echo "❌ Too few JNI symbols exported (expected ≥ 10, got ${EXPORTED})"
            "${NM_BIN}" -D --defined-only "${SO}" | grep "Java_org_rocksdb" || true
            exit 1
          fi
          echo "✅ JNI symbols OK"

      # ----------------------------------------------------------
      # 16. Upload artifact cho ABI này
      # ----------------------------------------------------------
      - name: Upload ${{ matrix.abi }} .so
        uses: actions/upload-artifact@v4
        with:
          name: librocksdbjni-${{ matrix.abi }}
          path: ${{ github.workspace }}/jni-lib/${{ matrix.abi }}/librocksdbjni.so
          retention-days: 7

  # ============================================================
  # Job 2: Đóng gói tất cả ABI vào 1 archive + tạo release
  # ============================================================
  package-release:
    name: Package & Release
    needs: build-android-so
    runs-on: ubuntu-22.04

    steps:
      - name: Download all ABI artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: librocksdbjni-*
          path: jni-libs
          merge-multiple: false

      - name: Organize directory structure
        run: |
          mkdir -p release/jni

          for abi in armeabi-v7a arm64-v8a x86 x86_64; do
            SRC="jni-libs/librocksdbjni-${abi}/librocksdbjni.so"
            if [ -f "${SRC}" ]; then
              mkdir -p "release/jni/${abi}"
              cp "${SRC}" "release/jni/${abi}/librocksdbjni.so"
              echo "✅ ${abi}: $(ls -lh release/jni/${abi}/librocksdbjni.so | awk '{print $5}')"
            else
              echo "⚠️  ${abi}: file not found, skipping"
            fi
          done

          # Tạo zip tổng
          cd release
          zip -r "../librocksdbjni-android-${{ env.ROCKSDB_VERSION }}.zip" jni/
          cd ..
          ls -lh "librocksdbjni-android-${{ env.ROCKSDB_VERSION }}.zip"

      - name: Show summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| ABI | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|------|" >> $GITHUB_STEP_SUMMARY
          for abi in armeabi-v7a arm64-v8a x86 x86_64; do
            SO="release/jni/${abi}/librocksdbjni.so"
            if [ -f "${SO}" ]; then
              SIZE=$(ls -lh "${SO}" | awk '{print $5}')
              echo "| ${abi} | ${SIZE} |" >> $GITHUB_STEP_SUMMARY
            fi
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**RocksDB version:** \`${{ env.ROCKSDB_VERSION }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**NDK:** \`${{ env.NDK_VERSION }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Min API:** \`${{ env.MIN_SDK }}\`" >> $GITHUB_STEP_SUMMARY

      - name: Upload combined release artifact
        uses: actions/upload-artifact@v4
        with:
          name: librocksdbjni-android-${{ env.ROCKSDB_VERSION }}
          path: librocksdbjni-android-${{ env.ROCKSDB_VERSION }}.zip
          retention-days: 30

      # Tự động tạo GitHub Release nếu chạy từ tag
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: librocksdbjni Android ${{ env.ROCKSDB_VERSION }}
          body: |
            ## librocksdbjni ${{ env.ROCKSDB_VERSION }} for Android

            Self-contained builds — mỗi file `.so` chứa đầy đủ:
            - **RocksDB** ${{ env.ROCKSDB_VERSION }}
            - **zlib** 1.3.1
            - **LZ4** 1.9.4
            - **Snappy** 1.2.1
            - **BZ2** 1.0.8
            - **Zstd** 1.5.6

            ### Supported ABIs
            | ABI | Target |
            |-----|--------|
            | `arm64-v8a` | AArch64 (Android 5.0+) |
            | `armeabi-v7a` | ARMv7 with NEON (Android 5.0+) |
            | `x86_64` | x86 64-bit emulator |
            | `x86` | x86 32-bit emulator |

            ### Sử dụng
            Giải nén và đặt thư mục `jni/` vào `src/main/` của Android module.
          files: librocksdbjni-android-${{ env.ROCKSDB_VERSION }}.zip
          draft: false
          prerelease: false
