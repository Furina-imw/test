# ══════════════════════════════════════════════════════════════════════════════
#  Build librocksdbjni-linux-aarch64.so  cho Android AArch64 (arm64-v8a)
#  Target: org.rocksdb:rocksdbjni:10.2.1 — Voxy mod / PojavLauncher
#  Output: 1 file duy nhất, standalone (C++ linked statically)
# ══════════════════════════════════════════════════════════════════════════════
name: Build librocksdbjni Android AArch64 (Voxy)

on:
  workflow_dispatch:
    inputs:
      rocksdb_version:
        description: "RocksDB tag — Voxy dùng v10.2.1"
        required: true
        default: "v10.2.1"
      android_api:
        description: "Android min API (21 = Android 5.0+)"
        required: true
        default: "21"

env:
  ROCKSDB_VERSION: ${{ github.event.inputs.rocksdb_version || 'v10.2.1' }}
  ANDROID_API:     ${{ github.event.inputs.android_api    || '21'       }}
  NDK_VERSION:     "26.3.11579264"    # r26d — format dùng cho setup-android
  TARGET_TRIPLE:   aarch64-linux-android
  ABI:             arm64-v8a
  INSTALL:         ${{ github.workspace }}/deps

jobs:
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  JOB 1 ▸ Build static compression libs (zlib · snappy · lz4 · zstd)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  build-deps:
    name: "① Static compression libs"
    runs-on: ubuntu-22.04

    steps:
      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build git wget unzip

      # setup-android action cài NDK đúng cách vào ANDROID_SDK_ROOT
      - name: Setup Android NDK r26d
        uses: android-actions/setup-android@v3
        with:
          packages: "ndk;${{ env.NDK_VERSION }}"

      - name: Resolve NDK root
        run: |
          NDK_ROOT="$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}"
          echo "NDK_ROOT=$NDK_ROOT" >> "$GITHUB_ENV"
          echo "CMAKE_TC=$NDK_ROOT/build/cmake/android.toolchain.cmake" >> "$GITHUB_ENV"
          echo "TOOLCHAIN=$NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64" >> "$GITHUB_ENV"
          # Xác nhận tồn tại
          ls "$NDK_ROOT/build/cmake/android.toolchain.cmake"
          "$NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang" --version

      - name: Cache compression libs
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: ${{ env.INSTALL }}
          key: deps-android-aarch64-api${{ env.ANDROID_API }}-zlib1.3.1-snappy1.2.1-lz4.1.9.4-zstd1.5.6

      - name: Build zlib 1.3.1
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 --branch v1.3.1 https://github.com/madler/zlib.git /tmp/zlib
          cmake -S /tmp/zlib -B /tmp/zlib/build \
            -DCMAKE_TOOLCHAIN_FILE="$CMAKE_TC" \
            -DANDROID_ABI="${{ env.ABI }}" \
            -DANDROID_PLATFORM="android-${{ env.ANDROID_API }}" \
            -DANDROID_STL=c++_static \
            -DANDROID_ARM_NEON=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="${{ env.INSTALL }}" \
            -DBUILD_SHARED_LIBS=OFF \
            -G Ninja
          cmake --build /tmp/zlib/build --parallel $(nproc) --target install

      - name: Build snappy 1.2.1
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 --branch 1.2.1 https://github.com/google/snappy.git /tmp/snappy
          cmake -S /tmp/snappy -B /tmp/snappy/build \
            -DCMAKE_TOOLCHAIN_FILE="$CMAKE_TC" \
            -DANDROID_ABI="${{ env.ABI }}" \
            -DANDROID_PLATFORM="android-${{ env.ANDROID_API }}" \
            -DANDROID_STL=c++_static \
            -DANDROID_ARM_NEON=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="${{ env.INSTALL }}" \
            -DBUILD_SHARED_LIBS=OFF \
            -DSNAPPY_BUILD_TESTS=OFF \
            -DSNAPPY_BUILD_BENCHMARKS=OFF \
            -G Ninja
          cmake --build /tmp/snappy/build --parallel $(nproc) --target install

      - name: Build lz4 1.9.4
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 --branch v1.9.4 https://github.com/lz4/lz4.git /tmp/lz4
          cmake -S /tmp/lz4/build/cmake -B /tmp/lz4/build/out \
            -DCMAKE_TOOLCHAIN_FILE="$CMAKE_TC" \
            -DANDROID_ABI="${{ env.ABI }}" \
            -DANDROID_PLATFORM="android-${{ env.ANDROID_API }}" \
            -DANDROID_STL=c++_static \
            -DANDROID_ARM_NEON=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="${{ env.INSTALL }}" \
            -DBUILD_SHARED_LIBS=OFF \
            -DLZ4_BUILD_CLI=OFF \
            -DLZ4_BUILD_LEGACY_LZ4C=OFF \
            -G Ninja
          cmake --build /tmp/lz4/build/out --parallel $(nproc) --target install

      - name: Build zstd 1.5.6
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 --branch v1.5.6 https://github.com/facebook/zstd.git /tmp/zstd
          cmake -S /tmp/zstd/build/cmake -B /tmp/zstd/build/out \
            -DCMAKE_TOOLCHAIN_FILE="$CMAKE_TC" \
            -DANDROID_ABI="${{ env.ABI }}" \
            -DANDROID_PLATFORM="android-${{ env.ANDROID_API }}" \
            -DANDROID_STL=c++_static \
            -DANDROID_ARM_NEON=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="${{ env.INSTALL }}" \
            -DBUILD_SHARED_LIBS=OFF \
            -DZSTD_BUILD_PROGRAMS=OFF \
            -DZSTD_BUILD_TESTS=OFF \
            -G Ninja
          cmake --build /tmp/zstd/build/out --parallel $(nproc) --target install

      - name: Verify libs
        run: |
          echo "=== Static libs ==="
          find "${{ env.INSTALL }}" -name "*.a" | sort
          echo "=== Headers ==="
          find "${{ env.INSTALL }}/include" -name "*.h" | head -10

      - name: Upload deps
        uses: actions/upload-artifact@v4
        with:
          name: deps-android-aarch64
          path: ${{ env.INSTALL }}
          retention-days: 1

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  JOB 2 ▸ Build librocksdbjni-linux-aarch64.so via CMake WITH_JNI
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  build-jni:
    name: "② librocksdbjni-linux-aarch64.so"
    runs-on: ubuntu-22.04
    needs: build-deps

    steps:
      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build git openjdk-17-jdk-headless file

      - name: Set JAVA_HOME
        run: |
          echo "JAVA_HOME=$(dirname $(dirname $(readlink -f $(which javac))))" >> "$GITHUB_ENV"

      - name: Setup Android NDK r26d
        uses: android-actions/setup-android@v3
        with:
          packages: "ndk;${{ env.NDK_VERSION }}"

      - name: Resolve NDK paths
        run: |
          NDK_ROOT="$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}"
          TOOLCHAIN="$NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64"
          TRIPLE="${{ env.TARGET_TRIPLE }}${{ env.ANDROID_API }}"

          echo "NDK_ROOT=$NDK_ROOT"             >> "$GITHUB_ENV"
          echo "TOOLCHAIN=$TOOLCHAIN"           >> "$GITHUB_ENV"
          echo "CMAKE_TC=$NDK_ROOT/build/cmake/android.toolchain.cmake" >> "$GITHUB_ENV"
          echo "CC=$TOOLCHAIN/bin/${TRIPLE}-clang"    >> "$GITHUB_ENV"
          echo "CXX=$TOOLCHAIN/bin/${TRIPLE}-clang++" >> "$GITHUB_ENV"
          echo "AR=$TOOLCHAIN/bin/llvm-ar"            >> "$GITHUB_ENV"
          echo "RANLIB=$TOOLCHAIN/bin/llvm-ranlib"    >> "$GITHUB_ENV"
          echo "STRIP=$TOOLCHAIN/bin/llvm-strip"      >> "$GITHUB_ENV"
          echo "READELF=$TOOLCHAIN/bin/llvm-readelf"  >> "$GITHUB_ENV"
          echo "NM=$TOOLCHAIN/bin/llvm-nm"            >> "$GITHUB_ENV"

          "$TOOLCHAIN/bin/${TRIPLE}-clang" --version

      - name: Download deps
        uses: actions/download-artifact@v4
        with:
          name: deps-android-aarch64
          path: ${{ env.INSTALL }}

      - name: Checkout RocksDB ${{ env.ROCKSDB_VERSION }}
        uses: actions/checkout@v4
        with:
          repository: facebook/rocksdb
          ref: ${{ env.ROCKSDB_VERSION }}
          path: rocksdb
          submodules: recursive
          fetch-depth: 1

      - name: Patch RocksDB for Android
        working-directory: rocksdb
        run: |
          # Tắt jemalloc (không có trên Android)
          sed -i \
            -e 's/set(WITH_JEMALLOC ON)/set(WITH_JEMALLOC OFF)/g' \
            -e '/find_package.*jemalloc/Id' \
            CMakeLists.txt || true

          # Thêm Android-specific defines
          cat >> CMakeLists.txt << 'EOF'
          if(ANDROID)
            add_compile_definitions(OS_ANDROID ROCKSDB_NO_DYNAMIC_EXTENSION)
            # fallocate không available đầy đủ trên Android
            set(HAVE_FALLOCATE 0)
          endif()
          EOF

      - name: CMake configure
        working-directory: rocksdb
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="${{ env.CMAKE_TC }}" \
            -DANDROID_ABI="${{ env.ABI }}" \
            -DANDROID_PLATFORM="android-${{ env.ANDROID_API }}" \
            -DANDROID_STL=c++_static \
            -DANDROID_ARM_NEON=ON \
            \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER="${{ env.CC }}" \
            -DCMAKE_CXX_COMPILER="${{ env.CXX }}" \
            -DCMAKE_AR="${{ env.AR }}" \
            -DCMAKE_RANLIB="${{ env.RANLIB }}" \
            \
            -DCMAKE_CXX_STANDARD=20 \
            -DCMAKE_CXX_STANDARD_REQUIRED=ON \
            -DCMAKE_C_FLAGS="-O2 -fPIC -DANDROID -D__ANDROID_API__=${{ env.ANDROID_API }}" \
            -DCMAKE_CXX_FLAGS="-O2 -fPIC -DANDROID -D__ANDROID_API__=${{ env.ANDROID_API }} -frtti -fexceptions -Wno-error" \
            -DCMAKE_SHARED_LINKER_FLAGS="-Wl,--build-id=sha1 -Wl,--no-undefined -llog -lz -latomic" \
            \
            -DCMAKE_PREFIX_PATH="${{ env.INSTALL }}" \
            -DCMAKE_FIND_ROOT_PATH="${{ env.INSTALL }}" \
            \
            -DWITH_JNI=ON \
            -DJAVA_HOME="${{ env.JAVA_HOME }}" \
            -DJNI_INCLUDE_DIRS="${{ env.JAVA_HOME }}/include;${{ env.JAVA_HOME }}/include/linux" \
            \
            -DROCKSDB_BUILD_SHARED=ON \
            -DBUILD_SHARED_LIBS=ON \
            \
            -DWITH_GFLAGS=OFF \
            -DWITH_TESTS=OFF \
            -DWITH_TOOLS=OFF \
            -DWITH_BENCHMARK_TOOLS=OFF \
            -DWITH_CORE_TOOLS=OFF \
            -DWITH_TRACE_TOOLS=OFF \
            -DWITH_JEMALLOC=OFF \
            -DWITH_BZ2=OFF \
            -DPORTABLE=ON \
            -DFORCE_SSE42=OFF \
            -DFAIL_ON_WARNINGS=OFF \
            \
            -DWITH_SNAPPY=ON \
            -DSNAPPY_LIBRARIES="${{ env.INSTALL }}/lib/libsnappy.a" \
            -DSNAPPY_INCLUDE_DIR="${{ env.INSTALL }}/include" \
            \
            -DWITH_LZ4=ON \
            -DLZ4_LIBRARIES="${{ env.INSTALL }}/lib/liblz4.a" \
            -DLZ4_INCLUDE_DIRS="${{ env.INSTALL }}/include" \
            \
            -DWITH_ZLIB=ON \
            -DZLIB_LIBRARY="${{ env.INSTALL }}/lib/libz.a" \
            -DZLIB_INCLUDE_DIR="${{ env.INSTALL }}/include" \
            \
            -DWITH_ZSTD=ON \
            -Dzstd_LIBRARIES="${{ env.INSTALL }}/lib/libzstd.a" \
            -Dzstd_INCLUDE_DIR="${{ env.INSTALL }}/include" \
            2>&1

          echo "=== CMake targets available ==="
          cmake --build build --target help 2>/dev/null | grep -i "rocksdb\|jni" || true

      - name: Build (ninja)
        working-directory: rocksdb
        run: |
          # Thử các target theo thứ tự ưu tiên
          ninja -C build -j$(nproc) rocksdbjni 2>&1 && echo "✓ target: rocksdbjni" && exit 0 || true
          ninja -C build -j$(nproc) rocksdb    2>&1 && echo "✓ target: rocksdb"    && exit 0 || true
          # Fallback: build tất cả
          echo "=== Fallback: build all ==="
          ninja -C build -j$(nproc) 2>&1 || \
          (echo "=== FAILED — verbose log ===" && ninja -C build -j1 -v 2>&1 | tail -150 && exit 1)

      - name: Find output .so
        id: find-so
        working-directory: rocksdb
        run: |
          echo "=== All .so files ==="
          find build -name "*.so" -type f | sort

          # Ưu tiên: librocksdbjni > librocksdb
          SO=$(find build -name "librocksdbjni*.so" -type f | head -1)
          if [ -z "$SO" ]; then
            SO=$(find build -name "librocksdb.so"   -type f | head -1)
          fi
          if [ -z "$SO" ]; then
            echo "❌ Không tìm thấy .so output!"
            exit 1
          fi

          echo "→ Using: $SO"
          echo "SO_PATH=${{ github.workspace }}/rocksdb/$SO" >> "$GITHUB_ENV"

      - name: Package output
        run: |
          mkdir -p output
          cp "${{ env.SO_PATH }}" output/librocksdbjni-linux-aarch64.so
          ls -lh output/

      - name: Strip debug symbols
        run: |
          ${{ env.STRIP }} --strip-unneeded output/librocksdbjni-linux-aarch64.so
          echo "Stripped: $(ls -lh output/librocksdbjni-linux-aarch64.so | awk '{print $5}')"

      - name: Verify output
        run: |
          SO="output/librocksdbjni-linux-aarch64.so"

          echo "════ File type ════"
          file "$SO"

          echo ""
          echo "════ ELF header ════"
          ${{ env.READELF }} -h "$SO" | grep -E "Class|Machine|Type|OS/ABI"

          echo ""
          echo "════ Dynamic dependencies ════"
          ${{ env.READELF }} -d "$SO" | grep NEEDED || echo "(none)"

          echo ""
          echo "════ JNI exports ════"
          ${{ env.NM }} -D "$SO" 2>/dev/null | grep "Java_org_rocksdb" | head -10 || echo "(none found)"
          JNI_COUNT=$(${{ env.NM }} -D "$SO" 2>/dev/null | grep -c "Java_org_rocksdb" || echo 0)
          echo "Total JNI symbols: $JNI_COUNT"

          echo ""
          echo "════ Checks ════"
          FAIL=0

          # 1. AArch64
          if ${{ env.READELF }} -h "$SO" | grep -q "AArch64"; then
            echo "✅ Architecture: AArch64"
          else
            echo "❌ Architecture sai!"
            FAIL=1
          fi

          # 2. Không link glibc desktop
          if ${{ env.READELF }} -d "$SO" | grep -q "libc.so.6"; then
            echo "❌ Link glibc — không chạy được trên Android!"
            FAIL=1
          else
            echo "✅ Không link glibc"
          fi

          # 3. Không cần libc++_shared
          if ${{ env.READELF }} -d "$SO" | grep -q "libc++_shared"; then
            echo "❌ Cần libc++_shared — không standalone!"
            FAIL=1
          else
            echo "✅ Standalone (không cần libc++_shared)"
          fi

          [ $FAIL -eq 0 ] || exit 1

          echo ""
          echo "════ Final size ════"
          ls -lh "$SO"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: librocksdbjni-android-aarch64-${{ env.ROCKSDB_VERSION }}
          path: output/librocksdbjni-linux-aarch64.so
          retention-days: 30

      - name: Job summary
        if: always()
        run: |
          SO="output/librocksdbjni-linux-aarch64.so"
          [ -f "$SO" ] && SIZE=$(ls -lh "$SO" | awk '{print $5}') || SIZE="N/A"
          JNI=$(${{ env.NM }} -D "$SO" 2>/dev/null | grep -c "Java_org_rocksdb" || echo 0)

          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## Build Result

          | | |
          |---|---|
          | RocksDB | \`${{ env.ROCKSDB_VERSION }}\` |
          | NDK | \`r26d\` (Clang 17) |
          | Android API | \`${{ env.ANDROID_API }}+\` |
          | ABI | \`arm64-v8a\` |
          | C++ standard | C++20 |
          | Standalone | ✅ (c++_static) |
          | File size | \`$SIZE\` |
          | JNI symbols | $JNI |

          ### Cách dùng
          \`\`\`
          -Djava.library.path=/path/to/dir/containing/librocksdbjni-linux-aarch64.so
          \`\`\`
          EOF

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  JOB 3 ▸ GitHub Release (chỉ khi push tag)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  release:
    name: "③ GitHub Release"
    runs-on: ubuntu-22.04
    needs: build-jni
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: librocksdbjni-android-aarch64-${{ env.ROCKSDB_VERSION }}
          path: output/

      - name: Checksum
        run: |
          cd output
          sha256sum librocksdbjni-linux-aarch64.so > sha256.txt
          cat sha256.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "librocksdbjni Android AArch64 · ${{ env.ROCKSDB_VERSION }}"
          body: |
            ## librocksdbjni Android AArch64 (Voxy mod)

            | | |
            |---|---|
            | RocksDB | `${{ env.ROCKSDB_VERSION }}` |
            | NDK | `r26d` |
            | Android API | `${{ env.ANDROID_API }}+` |
            | ABI | `arm64-v8a` |
            | Standalone | ✅ không cần file đi kèm |

            ```
            -Djava.library.path=/path/to/arm64-v8a
            ```
          files: |
            output/librocksdbjni-linux-aarch64.so
            output/sha256.txt
