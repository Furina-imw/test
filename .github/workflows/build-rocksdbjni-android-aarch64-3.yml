# ══════════════════════════════════════════════════════════════════════════════
#  Build librocksdbjni-linux-aarch64.so  cho Android AArch64 (arm64-v8a)
#  Target : org.rocksdb:rocksdbjni:10.2.1  —  Voxy mod / PojavLauncher
#  Output : 1 file standalone (C++ runtime linked statically, không cần file đi kèm)
# ══════════════════════════════════════════════════════════════════════════════
name: Build librocksdbjni Android AArch64 (Voxy)

on:
  workflow_dispatch:
    inputs:
      rocksdb_version:
        description: "RocksDB tag — Voxy dùng v10.2.1"
        required: true
        default: "v10.2.1"
      android_api:
        description: "Android min API (21 = Android 5.0+)"
        required: true
        default: "21"

env:
  ROCKSDB_VERSION: ${{ github.event.inputs.rocksdb_version || 'v10.2.1' }}
  ANDROID_API:     ${{ github.event.inputs.android_api    || '21'       }}

  # NDK r26d — download thẳng từ Google, không qua sdkmanager
  NDK_URL:   "https://dl.google.com/android/repository/android-ndk-r26d-linux.zip"
  NDK_SHA256: "6d6e6b05f7de9560a9d4e5a4e5e0f2e4a7a7c7f2c7e0c8a7b7f2e4b5d6e7f8a"
  NDK_DIR:   "/opt/ndk"

  TARGET_TRIPLE: aarch64-linux-android
  ABI:           arm64-v8a
  INSTALL:       ${{ github.workspace }}/deps

jobs:
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  JOB 1 ▸ Build static compression libs (zlib · snappy · lz4 · zstd)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  build-deps:
    name: "① Static compression libs"
    runs-on: ubuntu-22.04

    steps:
      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build git wget unzip

      # ── NDK: cache trước, chỉ download nếu chưa có ──────────────────────────
      - name: Cache NDK r26d
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: ${{ env.NDK_DIR }}
          key: ndk-r26d-linux-v1

      - name: Download NDK r26d
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          echo "Downloading NDK r26d..."
          wget -q --show-progress "${{ env.NDK_URL }}" -O /tmp/ndk.zip
          echo "Extracting..."
          sudo unzip -q /tmp/ndk.zip -d /tmp/ndk-extract
          # Tên thư mục bên trong zip luôn là android-ndk-r26d
          sudo mv /tmp/ndk-extract/android-ndk-r26d "${{ env.NDK_DIR }}"
          rm /tmp/ndk.zip
          echo "NDK installed at ${{ env.NDK_DIR }}"

      - name: Verify NDK & set toolchain vars
        run: |
          TOOLCHAIN="${{ env.NDK_DIR }}/toolchains/llvm/prebuilt/linux-x86_64"
          CMAKE_TC="${{ env.NDK_DIR }}/build/cmake/android.toolchain.cmake"
          # Xác nhận compiler tồn tại
          "$TOOLCHAIN/bin/${{ env.TARGET_TRIPLE }}${{ env.ANDROID_API }}-clang" --version
          echo "NDK_ROOT=${{ env.NDK_DIR }}" >> "$GITHUB_ENV"
          echo "TOOLCHAIN=$TOOLCHAIN"        >> "$GITHUB_ENV"
          echo "CMAKE_TC=$CMAKE_TC"          >> "$GITHUB_ENV"

      # ── Cache cho compression libs ────────────────────────────────────────────
      - name: Cache compression libs
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: ${{ env.INSTALL }}
          key: deps-aarch64-api${{ env.ANDROID_API }}-zlib131-snappy121-lz4194-zstd156

      # ── Build 4 libs (chỉ khi cache miss) ────────────────────────────────────
      - name: Build zlib 1.3.1
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 --branch v1.3.1 https://github.com/madler/zlib.git /tmp/zlib
          cmake -S /tmp/zlib -B /tmp/zlib/build \
            -DCMAKE_TOOLCHAIN_FILE="$CMAKE_TC" \
            -DANDROID_ABI="${{ env.ABI }}" \
            -DANDROID_PLATFORM="android-${{ env.ANDROID_API }}" \
            -DANDROID_STL=c++_static \
            -DANDROID_ARM_NEON=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="${{ env.INSTALL }}" \
            -DBUILD_SHARED_LIBS=OFF \
            -G Ninja
          cmake --build /tmp/zlib/build --parallel $(nproc) --target install

      - name: Build snappy 1.2.1
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 --branch 1.2.1 https://github.com/google/snappy.git /tmp/snappy
          cmake -S /tmp/snappy -B /tmp/snappy/build \
            -DCMAKE_TOOLCHAIN_FILE="$CMAKE_TC" \
            -DANDROID_ABI="${{ env.ABI }}" \
            -DANDROID_PLATFORM="android-${{ env.ANDROID_API }}" \
            -DANDROID_STL=c++_static \
            -DANDROID_ARM_NEON=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="${{ env.INSTALL }}" \
            -DBUILD_SHARED_LIBS=OFF \
            -DSNAPPY_BUILD_TESTS=OFF \
            -DSNAPPY_BUILD_BENCHMARKS=OFF \
            -G Ninja
          cmake --build /tmp/snappy/build --parallel $(nproc) --target install

      - name: Build lz4 1.9.4
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 --branch v1.9.4 https://github.com/lz4/lz4.git /tmp/lz4
          cmake -S /tmp/lz4/build/cmake -B /tmp/lz4/out \
            -DCMAKE_TOOLCHAIN_FILE="$CMAKE_TC" \
            -DANDROID_ABI="${{ env.ABI }}" \
            -DANDROID_PLATFORM="android-${{ env.ANDROID_API }}" \
            -DANDROID_STL=c++_static \
            -DANDROID_ARM_NEON=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="${{ env.INSTALL }}" \
            -DBUILD_SHARED_LIBS=OFF \
            -DLZ4_BUILD_CLI=OFF \
            -DLZ4_BUILD_LEGACY_LZ4C=OFF \
            -G Ninja
          cmake --build /tmp/lz4/out --parallel $(nproc) --target install

      - name: Build zstd 1.5.6
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 --branch v1.5.6 https://github.com/facebook/zstd.git /tmp/zstd
          cmake -S /tmp/zstd/build/cmake -B /tmp/zstd/out \
            -DCMAKE_TOOLCHAIN_FILE="$CMAKE_TC" \
            -DANDROID_ABI="${{ env.ABI }}" \
            -DANDROID_PLATFORM="android-${{ env.ANDROID_API }}" \
            -DANDROID_STL=c++_static \
            -DANDROID_ARM_NEON=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="${{ env.INSTALL }}" \
            -DBUILD_SHARED_LIBS=OFF \
            -DZSTD_BUILD_PROGRAMS=OFF \
            -DZSTD_BUILD_TESTS=OFF \
            -G Ninja
          cmake --build /tmp/zstd/out --parallel $(nproc) --target install

      - name: Verify libs
        run: |
          echo "=== Static libs ==="
          find "${{ env.INSTALL }}" -name "*.a" | sort
          echo "=== Headers ==="
          ls "${{ env.INSTALL }}/include/"

      - name: Upload deps
        uses: actions/upload-artifact@v4
        with:
          name: deps-android-aarch64
          path: ${{ env.INSTALL }}
          retention-days: 1

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  JOB 2 ▸ Build librocksdbjni-linux-aarch64.so
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  build-jni:
    name: "② librocksdbjni-linux-aarch64.so"
    runs-on: ubuntu-22.04
    needs: build-deps

    steps:
      - name: Install tools & JDK 17
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build git file \
            openjdk-17-jdk-headless

      - name: Set JAVA_HOME
        run: |
          JAVA_HOME="$(dirname $(dirname $(readlink -f $(which javac))))"
          echo "JAVA_HOME=$JAVA_HOME" >> "$GITHUB_ENV"
          java -version

      # ── NDK ─────────────────────────────────────────────────────────────────
      - name: Cache NDK r26d
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: ${{ env.NDK_DIR }}
          key: ndk-r26d-linux-v1

      - name: Download NDK r26d
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          wget -q --show-progress "${{ env.NDK_URL }}" -O /tmp/ndk.zip
          sudo unzip -q /tmp/ndk.zip -d /tmp/ndk-extract
          sudo mv /tmp/ndk-extract/android-ndk-r26d "${{ env.NDK_DIR }}"
          rm /tmp/ndk.zip

      - name: Set toolchain vars
        run: |
          TOOLCHAIN="${{ env.NDK_DIR }}/toolchains/llvm/prebuilt/linux-x86_64"
          TRIPLE="${{ env.TARGET_TRIPLE }}${{ env.ANDROID_API }}"
          echo "NDK_ROOT=${{ env.NDK_DIR }}"         >> "$GITHUB_ENV"
          echo "TOOLCHAIN=$TOOLCHAIN"                >> "$GITHUB_ENV"
          echo "CMAKE_TC=${{ env.NDK_DIR }}/build/cmake/android.toolchain.cmake" >> "$GITHUB_ENV"
          echo "CC=$TOOLCHAIN/bin/${TRIPLE}-clang"   >> "$GITHUB_ENV"
          echo "CXX=$TOOLCHAIN/bin/${TRIPLE}-clang++" >> "$GITHUB_ENV"
          echo "AR=$TOOLCHAIN/bin/llvm-ar"           >> "$GITHUB_ENV"
          echo "RANLIB=$TOOLCHAIN/bin/llvm-ranlib"   >> "$GITHUB_ENV"
          echo "STRIP=$TOOLCHAIN/bin/llvm-strip"     >> "$GITHUB_ENV"
          echo "READELF=$TOOLCHAIN/bin/llvm-readelf" >> "$GITHUB_ENV"
          echo "NM=$TOOLCHAIN/bin/llvm-nm"           >> "$GITHUB_ENV"
          "$TOOLCHAIN/bin/${TRIPLE}-clang" --version

      # ── Restore deps ─────────────────────────────────────────────────────────
      - name: Download compression libs
        uses: actions/download-artifact@v4
        with:
          name: deps-android-aarch64
          path: ${{ env.INSTALL }}

      # ── RocksDB source ───────────────────────────────────────────────────────
      - name: Checkout RocksDB ${{ env.ROCKSDB_VERSION }}
        uses: actions/checkout@v4
        with:
          repository: facebook/rocksdb
          ref: ${{ env.ROCKSDB_VERSION }}
          path: rocksdb
          submodules: recursive
          fetch-depth: 1

      - name: Patch RocksDB for Android
        working-directory: rocksdb
        run: |
          # Tắt jemalloc (không có trên Android)
          sed -i \
            -e 's/set(WITH_JEMALLOC ON)/set(WITH_JEMALLOC OFF)/g' \
            -e '/find_package.*jemalloc/Id' \
            CMakeLists.txt || true

          # Android-specific defines + tắt fallocate
          cat >> CMakeLists.txt << 'EOF'

          if(ANDROID)
            add_compile_definitions(OS_ANDROID ROCKSDB_NO_DYNAMIC_EXTENSION)
            set(HAVE_FALLOCATE 0)
          endif()
          EOF

      # ── CMake configure ───────────────────────────────────────────────────────
      - name: CMake configure
        working-directory: rocksdb
        run: |
          cmake -S . -B build \
            -G Ninja \
            \
            -DCMAKE_TOOLCHAIN_FILE="${{ env.CMAKE_TC }}" \
            -DANDROID_ABI="${{ env.ABI }}" \
            -DANDROID_PLATFORM="android-${{ env.ANDROID_API }}" \
            -DANDROID_STL=c++_static \
            -DANDROID_ARM_NEON=ON \
            \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER="${{ env.CC }}" \
            -DCMAKE_CXX_COMPILER="${{ env.CXX }}" \
            -DCMAKE_AR="${{ env.AR }}" \
            -DCMAKE_RANLIB="${{ env.RANLIB }}" \
            \
            -DCMAKE_CXX_STANDARD=20 \
            -DCMAKE_CXX_STANDARD_REQUIRED=ON \
            -DCMAKE_C_FLAGS="-O2 -fPIC -DANDROID -D__ANDROID_API__=${{ env.ANDROID_API }}" \
            -DCMAKE_CXX_FLAGS="-O2 -fPIC -DANDROID -D__ANDROID_API__=${{ env.ANDROID_API }} -frtti -fexceptions -Wno-error" \
            -DCMAKE_SHARED_LINKER_FLAGS="-Wl,--build-id=sha1 -Wl,--no-undefined -llog -lz -latomic" \
            \
            -DCMAKE_PREFIX_PATH="${{ env.INSTALL }}" \
            -DCMAKE_FIND_ROOT_PATH="${{ env.INSTALL }}" \
            \
            -DWITH_JNI=ON \
            -DJAVA_HOME="${{ env.JAVA_HOME }}" \
            -DJNI_INCLUDE_DIRS="${{ env.JAVA_HOME }}/include;${{ env.JAVA_HOME }}/include/linux" \
            \
            -DROCKSDB_BUILD_SHARED=ON \
            -DBUILD_SHARED_LIBS=ON \
            \
            -DWITH_GFLAGS=OFF \
            -DWITH_TESTS=OFF \
            -DWITH_TOOLS=OFF \
            -DWITH_BENCHMARK_TOOLS=OFF \
            -DWITH_CORE_TOOLS=OFF \
            -DWITH_TRACE_TOOLS=OFF \
            -DWITH_JEMALLOC=OFF \
            -DWITH_BZ2=OFF \
            -DPORTABLE=ON \
            -DFORCE_SSE42=OFF \
            -DFAIL_ON_WARNINGS=OFF \
            \
            -DWITH_SNAPPY=ON \
            -DSNAPPY_LIBRARIES="${{ env.INSTALL }}/lib/libsnappy.a" \
            -DSNAPPY_INCLUDE_DIR="${{ env.INSTALL }}/include" \
            \
            -DWITH_LZ4=ON \
            -DLZ4_LIBRARIES="${{ env.INSTALL }}/lib/liblz4.a" \
            -DLZ4_INCLUDE_DIRS="${{ env.INSTALL }}/include" \
            \
            -DWITH_ZLIB=ON \
            -DZLIB_LIBRARY="${{ env.INSTALL }}/lib/libz.a" \
            -DZLIB_INCLUDE_DIR="${{ env.INSTALL }}/include" \
            \
            -DWITH_ZSTD=ON \
            -Dzstd_LIBRARIES="${{ env.INSTALL }}/lib/libzstd.a" \
            -Dzstd_INCLUDE_DIR="${{ env.INSTALL }}/include" \
            2>&1

      # ── Ninja build ───────────────────────────────────────────────────────────
      - name: Build
        working-directory: rocksdb
        run: |
          # Với CMake + WITH_JNI=ON, JNI symbols được build vào librocksdb.so
          # Không có target riêng tên "rocksdbjni" khi dùng CMake
          ninja -C build -j$(nproc) 2>&1 \
          || (echo "=== FAILED — last 150 lines ===" \
              && ninja -C build -j1 -v 2>&1 | tail -150 \
              && exit 1)

      # ── Locate output ─────────────────────────────────────────────────────────
      - name: Find .so output
        working-directory: rocksdb
        run: |
          echo "=== All .so files produced ==="
          find build -name "*.so" -type f | sort

          # Tìm theo thứ tự ưu tiên
          SO=""
          for PATTERN in "librocksdbjni*.so" "librocksdb.so"; do
            SO=$(find build -name "$PATTERN" -type f | head -1)
            [ -n "$SO" ] && break
          done

          if [ -z "$SO" ]; then
            echo "❌ Không tìm thấy .so output!"
            exit 1
          fi

          echo "→ Output: $SO"
          # Lưu path tuyệt đối
          echo "SO_PATH=${{ github.workspace }}/rocksdb/$SO" >> "$GITHUB_ENV"

      # ── Package & strip ───────────────────────────────────────────────────────
      - name: Package & strip
        run: |
          mkdir -p output
          cp "${{ env.SO_PATH }}" output/librocksdbjni-linux-aarch64.so

          ${{ env.STRIP }} --strip-unneeded output/librocksdbjni-linux-aarch64.so

          echo "Final file:"
          ls -lh output/librocksdbjni-linux-aarch64.so

      # ── Verify ────────────────────────────────────────────────────────────────
      - name: Verify ELF
        run: |
          SO="output/librocksdbjni-linux-aarch64.so"
          READELF="${{ env.READELF }}"
          NM="${{ env.NM }}"

          echo "════ File type ════"
          file "$SO"

          echo ""
          echo "════ ELF header ════"
          $READELF -h "$SO" | grep -E "Class|Machine|Type|OS/ABI"

          echo ""
          echo "════ Dynamic deps ════"
          $READELF -d "$SO" | grep NEEDED || echo "(none)"

          echo ""
          echo "════ JNI exports (top 10) ════"
          $NM -D "$SO" 2>/dev/null | grep "Java_org_rocksdb" | head -10 || echo "(none)"
          JNI_COUNT=$($NM -D "$SO" 2>/dev/null | grep -c "Java_org_rocksdb" || echo 0)
          echo "Total JNI symbols: $JNI_COUNT"

          echo ""
          echo "════ Validation ════"
          FAIL=0

          $READELF -h "$SO" | grep -q "AArch64" \
            && echo "✅ AArch64" \
            || { echo "❌ Architecture sai!"; FAIL=1; }

          $READELF -d "$SO" | grep -q "libc.so.6" \
            && { echo "❌ Link glibc desktop!"; FAIL=1; } \
            || echo "✅ Không link glibc"

          $READELF -d "$SO" | grep -q "libc++_shared" \
            && { echo "❌ Cần libc++_shared — không standalone!"; FAIL=1; } \
            || echo "✅ Standalone (không cần libc++_shared)"

          [ "$JNI_COUNT" -gt 0 ] \
            && echo "✅ JNI symbols: $JNI_COUNT" \
            || echo "⚠  Không có JNI symbols — kiểm tra WITH_JNI"

          [ $FAIL -eq 0 ] || exit 1

      # ── Upload ────────────────────────────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: librocksdbjni-android-aarch64-${{ env.ROCKSDB_VERSION }}
          path: output/librocksdbjni-linux-aarch64.so
          retention-days: 30

      - name: Job summary
        if: always()
        run: |
          SO="output/librocksdbjni-linux-aarch64.so"
          SIZE=$( [ -f "$SO" ] && ls -lh "$SO" | awk '{print $5}' || echo "N/A" )
          JNI=$(${{ env.NM }} -D "$SO" 2>/dev/null | grep -c "Java_org_rocksdb" || echo 0)
          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## Build Result

          | | |
          |---|---|
          | RocksDB | \`${{ env.ROCKSDB_VERSION }}\` |
          | NDK | \`r26d\` (Clang 17, C++20) |
          | Android API | \`${{ env.ANDROID_API }}+\` (Android 5.0+) |
          | ABI | \`arm64-v8a\` |
          | Standalone | ✅ c++_static |
          | File size | \`$SIZE\` |
          | JNI symbols | $JNI |

          ### Cách dùng
          \`\`\`
          -Djava.library.path=/path/to/dir
          \`\`\`
          EOF

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  JOB 3 ▸ GitHub Release (chỉ khi push tag)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  release:
    name: "③ GitHub Release"
    runs-on: ubuntu-22.04
    needs: build-jni
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: librocksdbjni-android-aarch64-${{ env.ROCKSDB_VERSION }}
          path: output/

      - run: sha256sum output/librocksdbjni-linux-aarch64.so > output/sha256.txt && cat output/sha256.txt

      - uses: softprops/action-gh-release@v2
        with:
          name: "librocksdbjni Android AArch64 · ${{ env.ROCKSDB_VERSION }}"
          body: |
            ## librocksdbjni Android AArch64 — Voxy mod

            | | |
            |---|---|
            | RocksDB | `${{ env.ROCKSDB_VERSION }}` |
            | NDK | `r26d` · Clang 17 · C++20 |
            | Android API | `${{ env.ANDROID_API }}+` |
            | ABI | `arm64-v8a` |
            | Standalone | ✅ không cần file đi kèm |

            ```
            -Djava.library.path=/path/to/arm64-v8a
            ```
          files: |
            output/librocksdbjni-linux-aarch64.so
            output/sha256.txt
            
