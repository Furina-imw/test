name: Build JRE 25 for Android arm64-v8a (Minecraft Optimized)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Build JRE 25 (arm64-v8a)
    runs-on: ubuntu-latest

    steps:
      - name: Maximize disk space
        uses: easimon/maximize-build-space@v10
        with:
          root-reserve-mb: 51200
          swap-size-mb: 1024

      - name: Install minimal build dependencies
        run: |
          sudo apt-get update
          # Chỉ cài đặt những gói build thiết yếu, không cài thư viện Desktop
          sudo apt-get install -y build-essential autoconf zip unzip ccache tar xz-utils

      - name: Setup Boot JDK
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'

      - name: Setup Android NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r27c-linux.zip
          unzip -q android-ndk-r27c-linux.zip
          echo "ANDROID_NDK_HOME=$PWD/android-ndk-r27c" >> $GITHUB_ENV
          echo "ANDROID_NDK=$PWD/android-ndk-r27c" >> $GITHUB_ENV

      - name: Clone OpenJDK 25 Source Code
        run: |
          git clone --depth 1 https://github.com/openjdk/jdk.git jdk25

      - name: Configure OpenJDK (Headless, Bundled, Max Performance)
        run: |
          cd jdk25
          bash configure \
            --openjdk-target=aarch64-linux-android \
            --with-sysroot=$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64/sysroot \
            --with-toolchain-path=$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64/bin \
            --disable-warnings-as-errors \
            --enable-unlimited-crypto \
            --enable-headless-only \
            --with-freetype=bundled \
            --with-libpng=bundled \
            --with-zlib=bundled \
            --with-harfbuzz=bundled \
            --with-lcms=bundled \
            --with-native-debug-symbols=internal \
            --with-jvm-variants=server

      - name: Build OpenJDK Images
        run: |
          cd jdk25
          make images JOBS=$(nproc)

      - name: Create Optimized JRE using jlink
        run: |
          cd jdk25
          JDK_IMAGE=build/linux-aarch64-server-release/images/jdk
          
          # Đóng gói toàn bộ module khả dụng (đầy đủ tính năng nhất cho Minecraft)
          $JDK_IMAGE/bin/jlink \
            --module-path $JDK_IMAGE/jmods \
            --add-modules ALL-MODULE-PATH \
            --no-man-pages \
            --no-header-files \
            --compress=zip-6 \
            --output ../jre-25-android-arm64

      - name: Cleanup incompatible native libraries
        run: |
          cd jre-25-android-arm64
          # Xóa các thư viện native không tương thích hoặc không dùng được trên Android
          # libjsound.so: Android dùng OpenSL ES / AAudio, không dùng ALSA
          # libawt_xawt.so: Giao diện X11 không tồn tại trên Android
          find . -name "libjsound.so" -delete
          find . -name "libawt_xawt.so" -delete
          find . -name "libsplashscreen.so" -delete

      - name: Package as tar.xz
        run: |
          tar -cJf jre-25-android-arm64-v8a.tar.xz jre-25-android-arm64
          ls -lh jre-25-android-arm64-v8a.tar.xz

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: jre-25-android-arm64-v8a
          path: jre-25-android-arm64-v8a.tar.xz
          retention-days: 14
