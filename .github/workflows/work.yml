name: Build RocksDB Standalone Android ARM64

on:
  workflow_dispatch:

jobs:
  build-jni:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android NDK
        uses: android-actions/setup-android@v3

      - name: Clone Official RocksDB Source
        run: |
          git clone --depth 1 https://github.com/facebook/rocksdb.git

      - name: Configure CMake and Build Standalone Library
        run: |
          cd rocksdb
          mkdir build && cd build
          
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_ROOT/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-21 \
            -DCMAKE_BUILD_TYPE=Release \
            -DROCKSDB_BUILD_SHARED_LIBS=OFF \
            -DWITH_JNI=ON \
            -DPORTABLE=ON \
            -DFAIL_ON_WARNINGS=OFF \
            -DWITH_GFLAGS=OFF \
            -DWITH_TESTS=OFF \
            -DWITH_TOOLS=OFF \
            -DWITH_CORE_TOOLS=OFF \
            -DWITH_BENCHMARK_TOOLS=OFF \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON
            
          make -j$(nproc) rocksdbjni

      - name: Upload Standalone Library
        uses: actions/upload-artifact@v4
        with:
          name: librocksdbjni-standalone-arm64
          path: rocksdb/build/java/librocksdbjni.so
          
