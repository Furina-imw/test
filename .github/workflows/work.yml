name: Build RocksDB for Android ARM64

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout mã nguồn RocksDB
        uses: actions/checkout@v4
        with:
          repository: facebook/rocksdb
          ref: v10.2.1

      - name: Thiết lập Java 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Sửa lỗi JNI và Ép liên kết tĩnh cục bộ bằng Python
        run: |
          # Sửa lỗi thiếu file header cstdint
          sed -i '1s/^/#include <cstdint>\n/' db/blob/blob_file_meta.h
          
          python3 -c "
          # 1. Sửa lỗi ép kiểu JNIEnv trong portal.h như cũ
          with open('java/rocksjni/portal.h', 'r') as f:
              portal = f.read()
          portal = portal.replace('reinterpret_cast<void**>', 'reinterpret_cast<JNIEnv**>')
          portal = portal.replace('reinterpret_cast<void **>', 'reinterpret_cast<JNIEnv**>')
          with open('java/rocksjni/portal.h', 'w') as f:
              f.write(portal)
          
          # 2. Can thiệp cục bộ vào java/CMakeLists.txt
          with open('java/CMakeLists.txt', 'r') as f:
              cmake = f.read()
          
          # CHỈ thay thế lệnh liên kết của rocksdbjni từ bản shared sang bản tĩnh (rocksdb) và thêm thư viện log hệ thống Android
          old_link = 'target_link_libraries(rocksdbjni PRIVATE rocksdb-shared)'
          new_link = 'target_link_libraries(rocksdbjni PRIVATE rocksdb log)'
          
          if old_link in cmake:
              cmake = cmake.replace(old_link, new_link)
              print('-> Ép liên kết tĩnh cục bộ thành công!')
          else:
              # Dự phòng nếu cấu trúc khoảng trắng thay đổi
              cmake = cmake.replace('rocksdb-shared', 'rocksdb log')
              print('-> Cảnh báo: Thay thế hàng loạt có điều kiện!')
          
          with open('java/CMakeLists.txt', 'w') as f:
              f.write(cmake)
          "

      - name: Cấu hình CMake độc lập toàn phần (Nhúng lõi hoàn toàn)
        run: |
          mkdir build && cd build
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_LATEST_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-26 \
            -DFAIL_ON_WARNINGS=OFF \
            -DPORTABLE=ON \
            -DWITH_JNI=ON \
            -DWITH_GFLAGS=OFF \
            -DROCKSDB_BUILD_TESTS=OFF \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DCMAKE_CXX_FLAGS="-static-libstdc++" \
            -DCMAKE_SHARED_LINKER_FLAGS="-static-libstdc++ -Wl,--exclude-libs,ALL" \
            -DCMAKE_BUILD_TYPE=Release

      - name: Tiến hành Biên dịch ra file .so độc lập
        run: |
          cd build
          cmake --build . --target rocksdbjava -j$(nproc)

      - name: Tải file thành phẩm lên GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rocksdbjni-android-arm64
          path: |
            build/java/librocksdbjni*.so
            build/java/target/librocksdbjni*.so
            build/librocksdbjni*.so
          if-no-files-found: error
          
