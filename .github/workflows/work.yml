name: Build RocksDB for Android ARM64

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout mã nguồn RocksDB
        uses: actions/checkout@v4
        with:
          repository: facebook/rocksdb
          ref: v10.2.1

      - name: Thiết lập Java 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Sửa lỗi kiểu dữ liệu JNI trên Android (Sử dụng Regex linh hoạt)
        run: |
          # Thêm cstdint vào file header bị thiếu
          sed -i '1s/^/#include <cstdint>\n/' db/blob/blob_file_meta.h
          
          # Sử dụng Regex nhận diện linh hoạt mọi biến thể khoảng trắng của void**
          sed -i -E 's/reinterpret_cast<void[[:space:]]*\*\*>/reinterpret_cast<JNIEnv\*\*>/g' java/rocksjni/portal.h

      - name: Tạo thư mục Build và Cấu hình CMake với NDK có sẵn
        run: |
          mkdir build && cd build
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_LATEST_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-26 \
            -DFAIL_ON_WARNINGS=OFF \
            -DPORTABLE=ON \
            -DWITH_JNI=ON \
            -DWITH_GFLAGS=OFF \
            -DCMAKE_BUILD_TYPE=Release

      - name: Tiến hành Biên dịch ra file .so
        run: |
          cd build
          cmake --build . --target rocksdbjava -j$(nproc)

      - name: Tải file thành phẩm lên GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rocksdbjni-android-arm64
          path: build/java/librocksdbjni-*.so
