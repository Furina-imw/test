name: Build RocksDB for Android ARM64

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout mã nguồn RocksDB
        uses: actions/checkout@v4
        with:
          repository: facebook/rocksdb
          ref: v10.2.1

      - name: Thiết lập Java 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Ép buộc liên kết tĩnh toàn phần bằng Python
        run: |
          sed -i '1s/^/#include <cstdint>\n/' db/blob/blob_file_meta.h
          
          python3 -c "
          # 1. Sửa lỗi ép kiểu JNIEnv
          with open('java/rocksjni/portal.h', 'r') as f:
              content = f.read()
          content = content.replace('reinterpret_cast<void**>', 'reinterpret_cast<JNIEnv**>')
          content = content.replace('reinterpret_cast<void **>', 'reinterpret_cast<JNIEnv**>')
          with open('java/rocksjni/portal.h', 'w') as f:
              f.write(content)
          
          # 2. Can thiệp sâu vào java/CMakeLists.txt để gỡ bỏ hoàn toàn liên kết động
          with open('java/CMakeLists.txt', 'r') as f:
              cmake_content = f.read()
          
          # Thay thế bất kỳ cấu hình liên kết động nào liên quan đến rocksdb-shared sang thư viện tĩnh rocksdb
          cmake_content = cmake_content.replace('rocksdb-shared', 'rocksdb')
          
          # Thêm lệnh ép buộc liên kết tĩnh thủ công ở cuối file để chắc chắn
          cmake_content += '\n\ntarget_link_libraries(rocksdbjni PRIVATE rocksdb)\n'
          
          with open('java/CMakeLists.txt', 'w') as f:
              f.write(cmake_content)
          print('-> Đã cấu hình ép liên kết tĩnh sâu vào java/CMakeLists.txt')
          "

      - name: Cấu hình CMake với chế độ độc lập và cờ hệ thống NDK
        run: |
          mkdir build && cd build
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_LATEST_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-26 \
            -DFAIL_ON_WARNINGS=OFF \
            -DPORTABLE=ON \
            -DWITH_JNI=ON \
            -DWITH_GFLAGS=OFF \
            -DROCKSDB_BUILD_TESTS=OFF \
            -DROCKSDB_BUILD_SHARED_LIBS=OFF \
            -DCMAKE_CXX_FLAGS="-static-libstdc++" \
            -DCMAKE_SHARED_LINKER_FLAGS="-static-libstdc++" \
            -DCMAKE_BUILD_TYPE=Release

      - name: Tiến hành Biên dịch ra file .so độc lập
        run: |
          cd build
          cmake --build . --target rocksdbjava -j$(nproc)

      - name: Tải file thành phẩm lên GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rocksdbjni-android-arm64
          path: |
            build/java/librocksdbjni*.so
            build/java/target/librocksdbjni*.so
            build/librocksdbjni*.so
          if-no-files-found: error
          
