name: Build RocksDB for Android ARM64

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout mã nguồn RocksDB
        uses: actions/checkout@v4
        with:
          repository: facebook/rocksdb
          ref: v10.2.1

      - name: Thiết lập Java 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Sửa lỗi JNI và Thêm Header bằng Python
        run: |
          # Thêm cstdint vào file header bị thiếu
          sed -i '1s/^/#include <cstdint>\n/' db/blob/blob_file_meta.h
          
          # Sử dụng Python để thay thế chuỗi thô chính xác tuyệt đối, tránh lỗi cú pháp Shell
          python3 -c "
          with open('java/rocksjni/portal.h', 'r') as f:
              content = f.read()
          
          # Thay thế chính xác dòng lỗi JNIEnv truyền void**
          old_line = 'jvm->AttachCurrentThread(reinterpret_cast<void**>(&env), nullptr);'
          new_line = 'jvm->AttachCurrentThread(reinterpret_cast<JNIEnv**>(&env), nullptr);'
          
          if old_line in content:
              content = content.replace(old_line, new_line)
              print('-> Thay thế dòng void** thành JNIEnv** thành công!')
          else:
              print('-> Canh báo: Không tìm thấy chuỗi khớp tuyệt đối, tiến hành thử biến thể khoảng trắng...')
              content = content.replace('reinterpret_cast<void**>', 'reinterpret_cast<JNIEnv**>')
              content = content.replace('reinterpret_cast<void **>', 'reinterpret_cast<JNIEnv**>')
          
          with open('java/rocksjni/portal.h', 'w') as f:
              f.write(content)
          "

      - name: Tạo thư mục Build và Cấu hình CMake với NDK có sẵn
        run: |
          mkdir build && cd build
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_LATEST_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-26 \
            -DFAIL_ON_WARNINGS=OFF \
            -DPORTABLE=ON \
            -DWITH_JNI=ON \
            -DWITH_GFLAGS=OFF \
            -DCMAKE_BUILD_TYPE=Release
      - name: Tiến hành Biên dịch ra file .so
        run: |
          cd build
          cmake --build . --target rocksdbjava -j$(nproc)

      - name: Tải file thành phẩm lên GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rocksdbjni-android-arm64
          path: |
            build/java/librocksdbjni*.so
            build/java/target/librocksdbjni*.so
            build/librocksdbjni*.so
            build/librocksdb.so
          if-no-files-found: error
          
