name: Build RocksDB JNI Android ARM64

on:
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-latest

steps:
  - name: Checkout RocksDB 10.2.1
    uses: actions/checkout@v4
    with:
      repository: facebook/rocksdb
      ref: v10.2.1

  - name: Setup Java
    uses: actions/setup-java@v4
    with:
      distribution: temurin
      java-version: "17"

  - name: Setup Android NDK
    uses: nttld/setup-ndk@v1
    with:
      ndk-version: r27c

  - name: Install build tools
    run: |
      sudo apt-get update
      sudo apt-get install -y \
        build-essential \
        cmake \
        ninja-build \
        zip \
        unzip

  - name: Configure Android toolchain
    run: |
      echo "ANDROID_NDK_HOME=$ANDROID_NDK_ROOT" >> $GITHUB_ENV

      TOOLCHAIN=$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64

      echo "CC=$TOOLCHAIN/bin/aarch64-linux-android24-clang" >> $GITHUB_ENV
      echo "CXX=$TOOLCHAIN/bin/aarch64-linux-android24-clang++" >> $GITHUB_ENV
      echo "AR=$TOOLCHAIN/bin/llvm-ar" >> $GITHUB_ENV
      echo "RANLIB=$TOOLCHAIN/bin/llvm-ranlib" >> $GITHUB_ENV
      echo "STRIP=$TOOLCHAIN/bin/llvm-strip" >> $GITHUB_ENV

  - name: Build RocksDB JNI
    run: |
      export PORTABLE=1

      export CC
      export CXX
      export AR
      export RANLIB

      make clean || true

      make rocksdbjavastatic \
        JAVA_HOME="$JAVA_HOME" \
        -j$(nproc)

  - name: Locate JNI library
    run: |
      find . -name "*.so"

      JNI_FILE=$(find . -name "librocksdbjni*.so" | head -n 1)

      if [ -z "$JNI_FILE" ]; then
        echo "JNI library not found"
        exit 1
      fi

      mkdir output
      cp "$JNI_FILE" output/librocksdbjni-linux-aarch64.so

  - name: Check dependencies
    run: |
      readelf -d output/librocksdbjni-linux-aarch64.so || true

  - name: Upload artifact
    uses: actions/upload-artifact@v4
    with:
      name: librocksdbjni-linux-aarch64
      path: output/librocksdbjni-linux-aarch64.so
